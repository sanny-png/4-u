<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Baby Face ❤️</title>

    <!-- Cute Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music/do_for_love.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <h1>Hey Baby Face ❤️</h1>

        <div class="slideshow">
            <img id="slide" src="images/photo1.jpg">
        </div>

        <div class="story-box">
            <p>"Trouble makes my life interesting."</p>
            <p>"I love plot twists."</p>
            <p>"There's a lot you don't know about me."</p>
        </div>

        <h2>Quick Quiz 😌</h2>

        <div class="question">
            <p>Do you love me?</p>

            <button onclick="yesAnswer()">Yes ❤️</button>

            <button id="noBtn" onmouseover="moveButton()">
                No 💔
            </button>
        </div>

        <button onclick="revealMessage()">Tap me 👀</button>
        <p id="secret"></p>

        <p id="result"></p>

    </div>

    <canvas id="hearts"></canvas>

    <script src="script.js"></script>

</body>
</html>
